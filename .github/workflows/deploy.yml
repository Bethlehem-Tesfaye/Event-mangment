name: Deploy Full Stack to Render

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      OWNER_ID: tea-d184lk6mcj7s73b2pqh0

      FRONTEND_APP: frontend
      BACKEND_APP: server

      FRONTEND_SERVICE_ID: ${{ secrets.FRONTEND_SERVICE_ID }}
      BACKEND_SERVICE_ID: ${{ secrets.BACKEND_SERVICE_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #############################
      # Frontend install/build
      #############################
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        if: github.event.action != 'closed'
        run: |
          cd frontend
          npm run build

      #############################
      # Backend install/build
      #############################
      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Build Backend
        if: github.event.action != 'closed'
        run: |
          cd server
          if npm run | grep -q build; then npm run build; fi

      #############################
      # Production deployment (main branch)
      #############################
      - name: Deploy Production Frontend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🚀 Deploying frontend production..."
          npx render deploy --service-id $FRONTEND_SERVICE_ID --api-key $RENDER_API_KEY

      - name: Deploy Production Backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "🚀 Deploying backend production..."
          npx render deploy --service-id $BACKEND_SERVICE_ID --api-key $RENDER_API_KEY

      #############################
      # PR Preview deployment
      #############################
      - name: Deploy PR Preview Frontend
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ github.head_ref }}
          PREVIEW_NAME="${FRONTEND_APP}-pr-${PR_NUMBER}"

          echo "🔍 Deploying frontend PR preview #${PR_NUMBER} as $PREVIEW_NAME..."

          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"ownerId\": \"$OWNER_ID\",
              \"name\": \"$PREVIEW_NAME\",
              \"type\": \"web_service\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"$BRANCH_NAME\",
              \"plan\": \"free\",
              \"serviceDetails\": {
                \"env\": \"node\",
                \"buildCommand\": \"npm install && npm run build\",
                \"startCommand\": \"npm run start\",
                \"rootDir\": \"frontend\"
              }
            }")

          echo "Render response:"
          echo "$RESPONSE"

      - name: Deploy PR Preview Backend
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ github.head_ref }}
          PREVIEW_NAME="${BACKEND_APP}-pr-${PR_NUMBER}"

          echo "🔍 Deploying backend PR preview #${PR_NUMBER} as $PREVIEW_NAME..."

          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"ownerId\": \"$OWNER_ID\",
              \"name\": \"$PREVIEW_NAME\",
              \"type\": \"web_service\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"$BRANCH_NAME\",
              \"plan\": \"free\",
              \"serviceDetails\": {
                \"env\": \"node\",
                \"buildCommand\": \"npm install && npm run build\",
                \"startCommand\": \"npm run start\",
                \"rootDir\": \"server\"
              }
            }")

          echo "Render response:"
          echo "$RESPONSE"

      #############################
      # Install jq for cleanup
      #############################
      - name: Install jq
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: sudo apt-get install -y jq

      #############################
      # Cleanup PR Preview on close
      #############################
      - name: Remove PR Preview Services
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          for APP in $FRONTEND_APP $BACKEND_APP; do
            PREVIEW_NAME="${APP}-pr-${PR_NUMBER}"
            echo "🧹 Deleting preview service $PREVIEW_NAME..."

            SERVICE_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services" | jq -r ".[] | select(.name==\"$PREVIEW_NAME\") | .id")

            if [ -n "$SERVICE_ID" ]; then
              curl -X DELETE "https://api.render.com/v1/services/$SERVICE_ID" \
                -H "Authorization: Bearer $RENDER_API_KEY"
            fi
          done

      #############################
      # Comment PR with preview links
      #############################
      - name: Comment PR with Preview Links
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 PR Preview deployed:
            - Frontend: https://${{ env.FRONTEND_APP }}-pr-${{ github.event.pull_request.number }}.onrender.com
            - Backend: https://${{ env.BACKEND_APP }}-pr-${{ github.event.pull_request.number }}.onrender.com
