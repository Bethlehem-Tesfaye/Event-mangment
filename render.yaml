previews:
  generation: automatic
  expireAfterDays: 3 # Automatically delete preview after 3 days of inactivity

services:
  - type: web
    name: frontend-event-mangment
    runtime: static
    plan: standard
    envVars:
      # Preview-specific URLs
      - key: VITE_API_URL
        previewValue: https://server-event-mangment-{{BRANCH_NAME}}.onrender.com/api/v1
      - key: VITE_AUTH_API_URL
        previewValue: https://server-event-mangment-{{BRANCH_NAME}}.onrender.com
      - key: VITE_CLIENT_URL
        previewValue: https://frontend-event-mangment-{{BRANCH_NAME}}.onrender.com
    envGroups:
      - preview-secret # Link your secret environment group

  - type: web
    name: server-event-mangment
    runtime: node
    plan: standard
    envVars:
      # Optional: override dynamic URLs for backend workflows or callback URLs
      - key: CLIENT_URL
        previewValue: https://frontend-event-mangment-{{BRANCH_NAME}}.onrender.com
      - key: WORKFLOW_URL
        previewValue: https://server-event-mangment-{{BRANCH_NAME}}.onrender.com/workflow/email
      - key: GOOGLE_CALLBACK_URL
        previewValue: https://server-event-mangment-{{BRANCH_NAME}}.onrender.com/api/v1/auth/google/callback
    envGroups:
      - preview-secret # Link the same secret environment group
